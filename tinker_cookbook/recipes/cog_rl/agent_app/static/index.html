<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cog Coding Agent</title>
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --border:#2a313c;
    --fg:#e6edf3; --muted:#8b949e; --accent:#7ee787; --bad:#ff7b72; --warn:#e3b341;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  header h1 { font-size:18px; margin:0; font-weight:650; }
  header .tag { font-family:var(--mono); font-size:12px; color:var(--muted);
    border:1px solid var(--border); border-radius:6px; padding:2px 8px; }
  main { max-width:980px; margin:0 auto; padding:24px; }
  .controls { display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
    background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; }
  label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
  input, select, textarea { width:100%; background:var(--bg); color:var(--fg);
    border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:14px; font-family:inherit; }
  textarea { resize:vertical; min-height:64px; }
  .wide { grid-column:1 / -1; }
  .row { display:flex; gap:12px; align-items:center; margin-top:14px; }
  button.run { background:var(--accent); color:#04210c; border:none; border-radius:8px;
    padding:10px 20px; font-weight:650; font-size:14px; cursor:pointer; }
  button.run:disabled { opacity:.5; cursor:default; }
  .hint { color:var(--muted); font-size:13px; }
  .feed { margin-top:20px; display:flex; flex-direction:column; gap:14px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .card .head { display:flex; align-items:center; gap:10px; padding:10px 16px;
    border-bottom:1px solid var(--border); font-size:13px; }
  .card .head .who { font-weight:600; }
  .badge { font-family:var(--mono); font-size:12px; padding:2px 8px; border-radius:999px;
    border:1px solid var(--border); margin-left:auto; }
  .badge.ok { color:var(--accent); border-color:#2ea04340; }
  .badge.no { color:var(--bad); border-color:#ff7b7240; }
  pre { margin:0; padding:14px 16px; font-family:var(--mono); font-size:13px;
    white-space:pre-wrap; word-break:break-word; line-height:1.5; }
  pre.code { background:var(--panel2); }
  pre.out { color:var(--accent); }
  pre.err { color:var(--bad); }
  pre.fix { color:var(--warn); }
  details summary { cursor:pointer; color:var(--muted); font-size:12px; padding:8px 16px; }
  .verdict { padding:14px 18px; border-radius:12px; font-weight:600; }
  .verdict.ok { background:#1a2c1d; color:var(--accent); border:1px solid #2ea04340; }
  .verdict.no { background:#2c1a1a; color:var(--bad); border:1px solid #ff7b7240; }
</style>
</head>
<body>
<header>
  <h1>Cog Coding Agent</h1>
  <span class="tag">write &rarr; run &rarr; fix</span>
  <a href="/playground" style="margin-left:auto;color:#79c0ff;text-decoration:none;font-size:14px">Playground &rarr;</a>
</header>
<main>
  <div id="ckptBar" class="controls hidden" style="grid-template-columns:1fr auto auto; align-items:end; margin-bottom:12px">
    <div><label>Served checkpoint (live A/B)</label><select id="ckpt"></select></div>
    <button class="run" style="background:#79c0ff" onclick="selectCkpt()">Serve this</button>
    <span class="hint" id="ckptCurrent"></span>
  </div>
  <div class="controls">
    <div><label>Model</label><input id="model" value="gpt-5.5" /></div>
    <div><label>Max turns</label><input id="maxTurns" type="number" value="3" min="1" max="8" /></div>
    <div><label>Base URL (optional)</label><input id="baseUrl" placeholder="OPENAI_BASE_URL" /></div>
    <div class="wide"><label>Task (pick an example or write your own)</label>
      <select id="examplePick" onchange="onPick()"></select></div>
    <div class="wide"><label>Prompt</label>
      <textarea id="prompt" placeholder="Describe what the Cog program should emit."></textarea></div>
  </div>
  <div class="row">
    <button class="run" id="runBtn" onclick="runAgent()">Run agent</button>
    <span class="hint">The agent writes Cog, runs it, and fixes interpreter errors. It has no answer key.</span>
  </div>
  <div class="feed" id="feed"></div>
</main>

<script>
let EXAMPLES = [];
function esc(s){ return (s ?? '').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function loadExamples(){
  const r = await fetch('/api/examples'); EXAMPLES = (await r.json()).prompts;
  const sel = document.getElementById('examplePick');
  sel.innerHTML = '<option value="-1">Custom…</option>' +
    EXAMPLES.map((p,i)=>`<option value="${i}">${esc(p).slice(0,80)}</option>`).join('');
  if (EXAMPLES.length){ sel.value='0'; onPick(); }
}
function onPick(){
  const i=+document.getElementById('examplePick').value;
  document.getElementById('prompt').value = i<0 ? '' : EXAMPLES[i];
}

async function streamSSE(url, body, cb){
  const resp = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf='';
  while(true){
    const {value,done} = await reader.read(); if(done) break;
    buf += dec.decode(value,{stream:true}); let idx;
    while((idx=buf.indexOf('\n\n'))>=0){
      const chunk=buf.slice(0,idx); buf=buf.slice(idx+2);
      const line=chunk.split('\n').find(l=>l.startsWith('data: '));
      if(line) cb(JSON.parse(line.slice(6)));
    }
  }
}

function card(title, who){
  const el=document.createElement('div'); el.className='card';
  el.innerHTML=`<div class="head"><span class="who">${who}</span><span>${title}</span></div>`;
  document.getElementById('feed').appendChild(el); return el;
}

async function runAgent(){
  document.getElementById('feed').innerHTML='';
  const btn=document.getElementById('runBtn'); btn.disabled=true;
  const body={
    prompt:document.getElementById('prompt').value,
    model:document.getElementById('model').value.trim(),
    max_turns:+document.getElementById('maxTurns').value,
    openai_base_url:document.getElementById('baseUrl').value.trim()||null,
  };
  try { await streamSSE('/api/run', body, renderEvent); }
  catch(e){ card('stream error','system').innerHTML += `<pre class="err">${esc(String(e))}</pre>`; }
  btn.disabled=false;
}

function renderEvent(ev){
  if(ev.type==='assistant'){
    const c=card(`turn ${ev.turn}`,'agent');
    const reasoning=ev.content.replace(/```[\s\S]*?```/g,'').trim();
    if(reasoning){ const d=document.createElement('details');
      d.innerHTML=`<summary>model message</summary><pre>${esc(reasoning)}</pre>`; c.appendChild(d); }
    const pre=document.createElement('pre'); pre.className='code'; pre.textContent=ev.program; c.appendChild(pre);
  } else if(ev.type==='run'){
    const c=card(`interpreter`,'cog');
    const b=document.createElement('span'); b.className='badge '+(ev.ran_clean?'ok':'no');
    b.textContent=ev.ran_clean?'ran clean':(ev.error?ev.error.split(':')[0]:'error');
    c.querySelector('.head').appendChild(b);
    const pre=document.createElement('pre');
    if(ev.error){ pre.className='err'; pre.textContent=ev.error; }
    else { pre.className='out'; pre.textContent=ev.output||'(no output)'; }
    c.appendChild(pre);
  } else if(ev.type==='fix_request'){
    const c=card(`fix request → turn ${ev.turn+1}`,'cog');
    const pre=document.createElement('pre'); pre.className='fix'; pre.textContent=ev.content; c.appendChild(pre);
  } else if(ev.type==='done'){
    const v=document.createElement('div'); v.className='verdict '+(ev.ran_clean?'ok':'no');
    v.textContent=ev.ran_clean?`Final program ran cleanly in ${ev.turns} turn(s).`
                              :`Still erroring after ${ev.turns} turn(s).`;
    document.getElementById('feed').appendChild(v);
  } else if(ev.type==='api_error'){
    card('API error','system').innerHTML += `<pre class="err">${esc(ev.message)}</pre>`;
  }
}
// Checkpoint A/B selector — only shown when served via training/serve.py (endpoints present).
async function loadCheckpoints() {
  try {
    const r = await fetch('/api/checkpoints');
    if (!r.ok) return;  // standalone app (no Tinker serving layer): leave selector hidden
    const d = await r.json();
    const sel = document.getElementById('ckpt');
    sel.innerHTML = d.checkpoints.map(c => {
      const when = c.created_at ? '  ·  ' + c.created_at.slice(0, 16).replace('T', ' ') : '';
      return `<option value="${c.tinker_path}">${esc(c.label)}${when}</option>`;
    }).join('');
    if (d.current && d.current.tinker_path) sel.value = d.current.tinker_path;
    document.getElementById('ckptCurrent').textContent = 'serving: ' + (d.current?.label || '?');
    document.getElementById('ckptBar').classList.remove('hidden');
  } catch (e) { /* selector stays hidden */ }
}
async function selectCkpt() {
  const sel = document.getElementById('ckpt');
  const label = sel.options[sel.selectedIndex].text;
  document.getElementById('ckptCurrent').textContent = 'switching…';
  const r = await fetch('/api/select_checkpoint', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({tinker_path: sel.value, label})});
  const d = await r.json();
  document.getElementById('ckptCurrent').textContent = 'serving: ' + (d.current?.label || label);
}

loadExamples();
loadCheckpoints();
</script>
</body>
</html>
