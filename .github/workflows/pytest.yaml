name: pytest

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        transformers-version: ["4.57.6", "5.2.0"]

    name: test (transformers ${{ matrix.transformers-version }})

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: venv
        run: uv venv && uv sync --all-extras

      - name: pin transformers
        run: uv pip install transformers==${{ matrix.transformers-version }}

      - name: pytest (unit)
        run: uv run pytest tinker_cookbook/
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: coverage

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: venv
        run: uv venv && uv sync --all-extras

      - name: pin transformers
        run: uv pip install transformers==5.2.0

      - name: pytest with coverage
        run: >
          uv run pytest tinker_cookbook/
          --cov=tinker_cookbook
          --cov-report=term-missing
          --cov-report=html:coverage-html
          --cov-report=xml:coverage.xml
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          uv run coverage report --format=text >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "Coverage report unavailable" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 7
