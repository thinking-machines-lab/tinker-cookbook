name: weights-e2e

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    if: github.repository == 'thinking-machines-lab/tinker-cookbook'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        test:
          - test_export_gpt_oss
          - test_export_qwen3
          - test_export_qwen3_5
          - test_export_deepseek
          - test_adapter_qwen3
          - test_adapter_gpt_oss
          - test_adapter_qwen3_5
          - test_adapter_kimi
          - test_adapter_deepseek
          - test_strategy_consistency
          - test_quantized
          - test_quantized_equivalence
          - test_lifecycle
          - test_publish
          - test_adapter_publish
        transformers-version: ["4.57.6", "5.2.0"]
        exclude:
          # Qwen3.5 requires transformers >= 5.0
          - test: test_export_qwen3_5
            transformers-version: "4.57.6"
          - test: test_adapter_qwen3_5
            transformers-version: "4.57.6"
          # Lifecycle test doesn't depend on transformers version
          - test: test_lifecycle
            transformers-version: "4.57.6"
          # Publish test doesn't depend on transformers version
          - test: test_publish
            transformers-version: "4.57.6"
          # Adapter publish test doesn't depend on transformers version
          - test: test_adapter_publish
            transformers-version: "4.57.6"

    name: ${{ matrix.test }} (transformers ${{ matrix.transformers-version }})

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install-uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: venv
        run: uv venv && uv sync --all-extras

      - name: pin transformers
        run: uv pip install transformers==${{ matrix.transformers-version }}

      - name: run test
        run: uv run pytest tests/weights/${{ matrix.test }}.py -v --timeout=120
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TINKER_API_KEY: ${{ secrets.TINKER_API_KEY }}
