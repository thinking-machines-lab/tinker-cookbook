name: nightly

on:
  workflow_run:
    workflows: ["smoke-test-recipes"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write  # needed to create/delete releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Only run on the upstream repo (forks lack secrets and shouldn't publish releases)
    # and only if: manually triggered, or smoke tests passed on schedule
    if: >
      github.repository == 'thinking-machines-lab/tinker-cookbook' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'schedule'))
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install-uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: build
        run: uv build

      - name: smoke test
        run: |
          uv run python -c "import tinker_cookbook; print(f'Version: {tinker_cookbook.__version__}')"

      - name: get version
        id: version
        run: |
          VERSION=$(uv run python -c "import tinker_cookbook; print(tinker_cookbook.__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinker-cookbook-nightly
          path: dist/
          retention-days: 7

      - name: delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: create nightly release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          SHORT_SHA="${GITHUB_SHA::8}"
          {
            echo "Automated nightly build from \`main\` at $(date -u '+%Y-%m-%d %H:%M UTC')."
            echo ""
            echo "**Version:** \`${VERSION}\`"
            echo "**Commit:** [\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${GITHUB_SHA})"
            echo ""
            echo "### Install"
            echo "\`\`\`bash"
            echo "pip install 'tinker_cookbook @ https://github.com/${REPO}/releases/download/nightly/tinker_cookbook-${VERSION}-py3-none-any.whl'"
            echo "\`\`\`"
          } > /tmp/release-notes.md
          gh release create nightly dist/* \
            --prerelease \
            --title "Nightly Build (${VERSION})" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-nightly-branch:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push nightly branch
        run: git push origin HEAD:refs/heads/nightly --force

  sync-cookbook-api-to-docs:
    runs-on: ubuntu-latest
    needs: push-nightly-branch
    steps:
      - name: Checkout tinker-cookbook
        uses: actions/checkout@v4
        with:
          path: tinker-cookbook

      - name: Checkout tinker-docs
        uses: actions/checkout@v4
        with:
          repository: iterationlab/tinker-docs
          token: ${{ secrets.TINKER_DOCS_SYNC_TOKEN }}
          path: tinker-docs

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install tinker-docs dependencies
        run: |
          cd tinker-docs
          uv pip install --system -r requirements.txt

      - name: Generate cookbook API reference
        run: |
          cd tinker-docs
          python3 scripts/generate_cookbook_api_docs.py \
            --cookbook-dir "$GITHUB_WORKSPACE/tinker-cookbook" \
            --github-base "https://github.com/thinking-machines-lab/tinker-cookbook/blob/nightly"

      - name: Create or update PR in tinker-docs
        env:
          GH_TOKEN: ${{ secrets.TINKER_DOCS_SYNC_TOKEN }}
        run: |
          cd tinker-docs

          if [ -z "$(git status --porcelain)" ]; then
            echo "No API reference changes."
            exit 0
          fi

          BRANCH="sync/cookbook-api-nightly"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Check if the branch already exists on the remote
          if git ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard origin/main
          else
            git checkout -b "$BRANCH"
          fi

          git add docs/cookbook/api-reference/
          git commit -m "Sync cookbook API reference (nightly)

          Auto-generated from tinker-cookbook main at $(date -u '+%Y-%m-%d %H:%M UTC').
          GitHub links point to the nightly branch."
          git push origin "$BRANCH" --force

          # Create PR if one doesn't already exist, otherwise the force-push updates it
          EXISTING_PR=$(gh pr list --repo iterationlab/tinker-docs --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$EXISTING_PR" ]; then
            PR_URL=$(gh pr create \
              --repo iterationlab/tinker-docs \
              --title "Sync cookbook API reference (nightly)" \
              --body "$(cat <<EOF
          ## Summary

          Nightly sync of cookbook API reference from tinker-cookbook main.

          - GitHub source links point to the \`nightly\` branch
          - Auto-generated by the tinker-cookbook nightly workflow
          EOF
          )" \
              --base main)
            echo "PR created: $PR_URL"
            # Enable auto-merge
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
            gh pr merge "$PR_NUMBER" --repo iterationlab/tinker-docs --auto --squash || echo "Auto-merge not available (check branch protection settings)"
          else
            echo "Existing PR #$EXISTING_PR updated via force-push."
            # Re-enable auto-merge in case it was dismissed
            gh pr merge "$EXISTING_PR" --repo iterationlab/tinker-docs --auto --squash || echo "Auto-merge not available (check branch protection settings)"
          fi
