name: nightly

on:
  schedule:
    - cron: "0 0 * * *"  # midnight UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install-uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: run unit tests
        run: uv run pytest tinker_cookbook/ -x -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install-uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: build
        run: uv build

      - name: smoke test
        run: uv run python -c "import tinker_cookbook; print(f'Version: {tinker_cookbook.__version__}')"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinker-cookbook-nightly
          path: dist/
          retention-days: 7
