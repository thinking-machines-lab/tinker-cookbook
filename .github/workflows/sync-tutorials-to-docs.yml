name: Sync tutorials to tinker-docs

on:
  push:
    branches: [main]
    paths:
      - 'tutorials/*.py'

jobs:
  sync:
    if: "!contains(github.event.head_commit.message, '[skip-sync]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tinker-cookbook
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD~1 for diff
          path: tinker-cookbook

      - name: Checkout tinker-docs
        uses: actions/checkout@v4
        with:
          repository: iterationlab/tinker-docs
          token: ${{ secrets.TINKER_DOCS_SYNC_TOKEN }}
          path: tinker-docs

      - name: Detect changed tutorials
        id: changed
        run: |
          cd tinker-cookbook
          CHANGED=$(git diff HEAD~1..HEAD --name-only -- 'tutorials/*.py' | xargs -I{} basename {} .py | tr '\n' ' ')
          echo "tutorials=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "No tutorial files changed."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Changed tutorials: $CHANGED"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python + uv
        if: steps.changed.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.changed.outputs.skip != 'true'
        run: |
          cd tinker-cookbook
          uv sync --extra dev

      - name: Export and convert changed tutorials
        if: steps.changed.outputs.skip != 'true'
        env:
          TINKER_API_KEY: ${{ secrets.TINKER_API_KEY }}
        run: |
          set -e

          # Tutorial name -> docs output path mapping
          declare -A TUTORIAL_MAP
          TUTORIAL_MAP=(
            ["101_hello_tinker"]="basics/hello-tinker"
            ["102_first_sft"]="basics/first-sft"
            ["103_async_patterns"]="basics/async-patterns"
            ["104_first_rl"]="basics/first-rl"
            ["201_rendering"]="core-concepts/rendering"
            ["202_loss_functions"]="core-concepts/loss-functions"
            ["203_completers"]="core-concepts/completers"
            ["204_weights"]="core-concepts/weights"
            ["205_evaluations"]="core-concepts/evaluations"
            ["301_cookbook_abstractions"]="cookbook-abstractions/env-and-envgroupbuilder"
            ["302_custom_environment"]="cookbook-abstractions/custom-environment"
            ["303_sft_with_config"]="cookbook-abstractions/sft-with-config"
            ["304_rl_with_config"]="cookbook-abstractions/rl-with-config"
            ["401_sl_hyperparams"]="advanced/sl-hyperparams"
            ["402_rl_hyperparams"]="advanced/rl-hyperparams"
            ["403_dpo_preferences"]="advanced/dpo-preferences"
            ["404_sequence_extension"]="advanced/sequence-extension"
            ["405_multi_agent"]="advanced/multi-agent"
            ["406_prompt_distillation"]="advanced/prompt-distillation"
            ["407_rlhf_pipeline"]="advanced/rlhf-pipeline"
            ["501_export_hf"]="deployment/export-hf"
            ["502_lora_adapter"]="deployment/lora-adapter"
            ["503_publish_hub"]="deployment/publish-hub"
          )

          HTML_DIR="/tmp/tinker-tutorial-exports"
          DOCS_DIR="tinker-docs/docs/tutorials"
          COOKBOOK_DIR="tinker-cookbook"
          TIMEOUT=300

          mkdir -p "$HTML_DIR" "$DOCS_DIR/basics" "$DOCS_DIR/core-concepts" "$DOCS_DIR/cookbook-abstractions" "$DOCS_DIR/advanced" "$DOCS_DIR/deployment"

          for name in ${{ steps.changed.outputs.tutorials }}; do
            if [ -z "${TUTORIAL_MAP[$name]+x}" ]; then
              echo "SKIP $name (not in TUTORIAL_MAP)"
              continue
            fi

            src="$COOKBOOK_DIR/tutorials/${name}.py"
            html="$HTML_DIR/${name}.html"
            outpath="${TUTORIAL_MAP[$name]}"
            outfile="$DOCS_DIR/${outpath}.md"

            echo "==> Exporting $name ..."

            # Step 1: Export to HTML (run the notebook)
            cd tinker-cookbook
            if timeout "$TIMEOUT" uv run marimo export html "tutorials/${name}.py" --include-code -o "$html" -f 2>/dev/null; then
              echo "  OK (HTML exported)"
            else
              echo "  WARN: HTML export failed or timed out, will convert without outputs"
            fi
            cd ..

            # Step 2: Convert to markdown (marimo_to_md.py is stdlib-only)
            mkdir -p "$(dirname "$outfile")"
            if [ -f "$html" ]; then
              python3 tinker-docs/scripts/marimo_to_md.py "$src" "$outfile" --html "$html"
            else
              python3 tinker-docs/scripts/marimo_to_md.py "$src" "$outfile"
            fi

            echo "  -> $outfile"
          done

      - name: Add tip boxes and prerequisites
        if: steps.changed.outputs.skip != 'true'
        run: |
          cd tinker-docs
          python3 << 'PYEOF'
          from pathlib import Path

          RAW = "https://raw.githubusercontent.com/thinking-machines-lab/tinker-cookbook/main/tutorials"
          GH = "https://github.com/thinking-machines-lab/tinker-cookbook/blob/main/tutorials"

          prereqs = {
              "basics/first-sft": "- [Hello Tinker](hello-tinker.md)",
              "basics/async-patterns": "- [Your First SFT](first-sft.md)",
              "basics/first-rl": "- [Your First SFT](first-sft.md)\n    - [Async Patterns](async-patterns.md)",
              "core-concepts/rendering": "- [Your First SFT](../basics/first-sft.md)",
              "core-concepts/loss-functions": "- [Your First SFT](../basics/first-sft.md)",
              "core-concepts/completers": "- [Rendering](rendering.md)",
              "core-concepts/weights": "- [Hello Tinker](../basics/hello-tinker.md)",
              "core-concepts/evaluations": "- [Your First SFT](../basics/first-sft.md)",
              "cookbook-abstractions/env-and-envgroupbuilder": "- [First RL](../basics/first-rl.md)",
              "cookbook-abstractions/custom-environment": "- [Env & EnvGroupBuilder](env-and-envgroupbuilder.md)",
              "cookbook-abstractions/sft-with-config": "- [Your First SFT](../basics/first-sft.md)\n    - [Evaluations](../core-concepts/evaluations.md)",
              "cookbook-abstractions/rl-with-config": "- [Env & EnvGroupBuilder](env-and-envgroupbuilder.md)",
              "advanced/sl-hyperparams": "- [SFT with Config](../cookbook-abstractions/sft-with-config.md)",
              "advanced/rl-hyperparams": "- [RL with Config](../cookbook-abstractions/rl-with-config.md)",
              "advanced/dpo-preferences": "- [Your First SFT](../basics/first-sft.md)\n    - [Rendering](../core-concepts/rendering.md)",
              "advanced/sequence-extension": "- [First RL](../basics/first-rl.md)\n    - [Env & EnvGroupBuilder](../cookbook-abstractions/env-and-envgroupbuilder.md)",
              "advanced/multi-agent": "- [Completers](../core-concepts/completers.md)\n    - [Env & EnvGroupBuilder](../cookbook-abstractions/env-and-envgroupbuilder.md)",
              "advanced/prompt-distillation": "- [Your First SFT](../basics/first-sft.md)\n    - [Rendering](../core-concepts/rendering.md)",
              "advanced/rlhf-pipeline": "- [DPO & Preferences](dpo-preferences.md)\n    - [Your First SFT](../basics/first-sft.md)",
              "deployment/export-hf": "- [Weights Management](../core-concepts/weights.md)",
              "deployment/lora-adapter": "- [Weights Management](../core-concepts/weights.md)",
              "deployment/publish-hub": "- [Weights Management](../core-concepts/weights.md)",
          }

          tutorials = {
              "basics/hello-tinker": "101_hello_tinker.py",
              "basics/first-sft": "102_first_sft.py",
              "basics/async-patterns": "103_async_patterns.py",
              "basics/first-rl": "104_first_rl.py",
              "core-concepts/rendering": "201_rendering.py",
              "core-concepts/loss-functions": "202_loss_functions.py",
              "core-concepts/completers": "203_completers.py",
              "core-concepts/weights": "204_weights.py",
              "core-concepts/evaluations": "205_evaluations.py",
              "cookbook-abstractions/env-and-envgroupbuilder": "301_cookbook_abstractions.py",
              "cookbook-abstractions/custom-environment": "302_custom_environment.py",
              "cookbook-abstractions/sft-with-config": "303_sft_with_config.py",
              "cookbook-abstractions/rl-with-config": "304_rl_with_config.py",
              "advanced/sl-hyperparams": "401_sl_hyperparams.py",
              "advanced/rl-hyperparams": "402_rl_hyperparams.py",
              "advanced/dpo-preferences": "403_dpo_preferences.py",
              "advanced/sequence-extension": "404_sequence_extension.py",
              "advanced/multi-agent": "405_multi_agent.py",
              "advanced/prompt-distillation": "406_prompt_distillation.py",
              "advanced/rlhf-pipeline": "407_rlhf_pipeline.py",
              "deployment/export-hf": "501_export_hf.py",
              "deployment/lora-adapter": "502_lora_adapter.py",
              "deployment/publish-hub": "503_publish_hub.py",
          }

          count = 0
          for tpath, filename in tutorials.items():
              p = Path(f"docs/tutorials/{tpath}.md")
              if not p.exists():
                  continue
              content = p.read_text()
              if "Run it interactively" in content:
                  continue

              tip = f'!!! tip "Run it interactively [[source]]({GH}/{filename})"\n    ```bash\n    curl -O {RAW}/{filename} && uv run marimo edit {filename}\n    ```\n\n'

              first_newline = content.find('\n')
              if first_newline > 0:
                  meta_block = '\n'
                  if tpath in prereqs:
                      meta_block += f'!!! info "Prerequisites"\n    {prereqs[tpath]}\n\n'
                  meta_block += tip
                  content = content[:first_newline + 1] + meta_block + content[first_newline + 1:]

              p.write_text(content)
              count += 1

          print(f"  Added headers to {count} tutorials")
          PYEOF

      - name: Create PR in tinker-docs
        if: steps.changed.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.TINKER_DOCS_SYNC_TOKEN }}
        run: |
          cd tinker-docs

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          BRANCH="sync/tutorials-${GITHUB_SHA::8}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add docs/tutorials/
          git commit -m "Sync tutorials from tinker-cookbook ${GITHUB_SHA::8}

          Auto-generated from tinker-cookbook commit ${{ github.sha }}.
          Changed tutorials: ${{ steps.changed.outputs.tutorials }}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --repo iterationlab/tinker-docs \
            --title "Sync tutorials from tinker-cookbook" \
            --body "$(cat <<EOF
          ## Summary

          Auto-synced tutorial updates from [tinker-cookbook@${GITHUB_SHA::8}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

          **Changed tutorials:** ${{ steps.changed.outputs.tutorials }}

          Please review the rendered tutorials on the preview deployment before merging.
          EOF
          )" \
            --base main)

          echo "PR created: $PR_URL"
