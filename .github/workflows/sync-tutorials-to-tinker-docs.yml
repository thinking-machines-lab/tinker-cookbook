name: Sync tutorials to tinker-docs

on:
  pull_request:
    paths:
      - 'tutorials/*.py'
  push:
    branches: [main]
    paths:
      - 'tutorials/*.py'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  export-html:
    # Export changed marimo notebooks to HTML.
    # On PRs: uploads as artifact for review.
    # On main push: proceeds to sync job.
    if: "!contains(github.event.head_commit.message, '[sync]')"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout tinker-cookbook
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to detect changes

      - name: Detect changed tutorials
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # On manual trigger, export all tutorials
            CHANGED=$(ls tutorials/*.py | xargs -n1 basename | paste -sd, -)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # On PR, compare against base branch
            git fetch origin ${{ github.base_ref }} --depth=1
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'tutorials/*.py' | xargs -n1 basename 2>/dev/null | paste -sd, -)
          else
            # On push to main, compare with previous commit
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'tutorials/*.py' | xargs -n1 basename | paste -sd, -)
          fi
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed tutorials: $CHANGED"

      - name: Install uv
        if: steps.changes.outputs.files != ''
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        if: steps.changes.outputs.files != ''
        run: |
          uv sync
          uv pip install marimo

      - name: Export changed tutorials to HTML
        if: steps.changes.outputs.files != ''
        env:
          TINKER_API_KEY: ${{ secrets.TINKER_API_KEY }}
        run: |
          mkdir -p tutorials/html

          IFS=',' read -ra FILES <<< "${{ steps.changes.outputs.files }}"
          for file in "${FILES[@]}"; do
            name="${file%.py}"
            echo "::group::Exporting $file"
            uv run marimo export html \
              "tutorials/$file" \
              --include-code \
              -o "tutorials/html/$name.html" || {
                echo "::warning::Failed to export $file"
                continue
              }
            echo "::endgroup::"
          done

      - name: Upload HTML artifacts (for PR review)
        if: steps.changes.outputs.files != '' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-html-preview
          path: tutorials/html/*.html
          retention-days: 14

      - name: Comment on PR with preview link
        if: steps.changes.outputs.files != '' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "Tutorial HTML previews are available as [build artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}). Download and open in your browser to review.

          Changed tutorials: \`${{ steps.changes.outputs.files }}\`"

  sync-to-docs:
    # Only runs on push to main (not on PRs).
    # Creates a PR on tinker-docs with the exported HTML and wrapper MDX pages.
    needs: export-html
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout tinker-cookbook
        uses: actions/checkout@v4

      - name: Detect changed tutorials
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(ls tutorials/*.py | xargs -n1 basename | paste -sd, -)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'tutorials/*.py' | xargs -n1 basename | paste -sd, -)
          fi
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Install uv
        if: steps.changes.outputs.files != ''
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies and export HTML
        if: steps.changes.outputs.files != ''
        env:
          TINKER_API_KEY: ${{ secrets.TINKER_API_KEY }}
        run: |
          uv sync
          uv pip install marimo
          mkdir -p tutorials/html

          IFS=',' read -ra FILES <<< "${{ steps.changes.outputs.files }}"
          for file in "${FILES[@]}"; do
            name="${file%.py}"
            echo "Exporting $file -> $name.html"
            uv run marimo export html \
              "tutorials/$file" \
              --include-code \
              -o "tutorials/html/$name.html" || {
                echo "WARNING: Failed to export $file, skipping"
                continue
              }
          done

      - name: Checkout tinker-docs
        if: steps.changes.outputs.files != ''
        uses: actions/checkout@v4
        with:
          repository: iterationlab/tinker-docs
          token: ${{ secrets.TINKER_DOCS_SYNC_TOKEN }}
          path: tinker-docs

      - name: Copy HTML and create wrapper MDX pages
        if: steps.changes.outputs.files != ''
        run: |
          # Copy exported HTML to tinker-docs public directory
          mkdir -p tinker-docs/public/tutorials
          cp tutorials/html/*.html tinker-docs/public/tutorials/ 2>/dev/null || true

          # Create wrapper MDX pages with iframes
          mkdir -p tinker-docs/pages/tutorials
          for html_file in tinker-docs/public/tutorials/*.html; do
            [ -f "$html_file" ] || continue
            name=$(basename "$html_file" .html)

            cat > "tinker-docs/pages/tutorials/$name.mdx" << 'MDXEOF'
          <iframe
            src={`/tutorials/NOTEBOOK_NAME.html`}
            style={{width: '100%', height: '85vh', border: 'none', borderRadius: '8px'}}
          />
          MDXEOF
            sed -i "s/NOTEBOOK_NAME/$name/g" "tinker-docs/pages/tutorials/$name.mdx"
          done

          # Generate _meta.json for sidebar navigation
          python3 -c "
          import json, os, re

          tutorials_dir = 'tinker-docs/pages/tutorials'
          meta = {}
          for f in sorted(os.listdir(tutorials_dir)):
              if not f.endswith('.mdx'):
                  continue
              name = f.removesuffix('.mdx')
              # Convert '01_hello_tinker' -> '01. Hello Tinker'
              match = re.match(r'(\d+)_(.*)', name)
              if match:
                  num, rest = match.groups()
                  display = f'{num}. {rest.replace(\"_\", \" \").title()}'
              else:
                  display = name.replace('_', ' ').title()
              meta[name] = display

          with open(os.path.join(tutorials_dir, '_meta.json'), 'w') as f:
              json.dump(meta, f, indent=2)
              f.write('\n')
          "

      - name: Add tutorials section to docs navigation
        if: steps.changes.outputs.files != ''
        run: |
          cd tinker-docs
          if ! grep -q '"tutorials"' pages/_meta.json; then
            python3 -c "
          import json
          with open('pages/_meta.json') as f:
              meta = json.load(f)
          meta['---tutorials'] = {'type': 'separator', 'title': 'Tutorials'}
          meta['tutorials'] = {'title': 'Tutorials'}
          with open('pages/_meta.json', 'w') as f:
              json.dump(meta, f, indent=2)
              f.write('\n')
          "
          fi

      - name: Create PR in tinker-docs
        if: steps.changes.outputs.files != ''
        env:
          GH_TOKEN: ${{ secrets.TINKER_DOCS_SYNC_TOKEN }}
        run: |
          cd tinker-docs

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to sync."
            exit 0
          fi

          BRANCH="sync/tutorials-${GITHUB_SHA::8}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add pages/tutorials/ public/tutorials/ pages/_meta.json
          git commit -m "[sync] Update tutorials from tinker-cookbook ${GITHUB_SHA::8}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --repo iterationlab/tinker-docs \
            --title "[sync] Update tutorial notebooks" \
            --body "Auto-synced tutorial HTML exports from [tinker-cookbook@${GITHUB_SHA::8}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

          Changed tutorials: \`${{ steps.changes.outputs.files }}\`

          Please review the Cloudflare preview deployment before merging." \
            --base main)

          echo "PR created: $PR_URL"
